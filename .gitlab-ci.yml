image: eclipse-temurin:21-jdk

stages:
  - build
  - test
  - lint
  - deploy

# --- BACKEND JOBS ---
build_backend:
  stage: build
  before_script:
    - cd backend
    - chmod +x gradlew
  script:
    - ./gradlew clean assemble
  artifacts:
    paths:
      - backend/build/
    expire_in: 1 week

test_backend:
  stage: test
  dependencies:
    - build_backend
  before_script:
    - cd backend
    - chmod +x gradlew
  script:
    - ./gradlew test jacocoTestReport
    - |
      awk -F"," '{ instructions += $4 + $5; covered += $5 } END { printf("Total coverage: %.2f %%\n", 100*covered/instructions) }' build/reports/jacoco/test/jacocoTestReport.csv
  coverage: '/Total coverage: \d+\.\d+ %/'
  artifacts:
    when: always
    reports:
      junit: backend/build/test-results/test/**/TEST-*.xml

# --- FRONTEND JOBS ---
build_frontend:
  image: node:22
  stage: build
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week

test_frontend:
  image: node:22
  stage: test
  script:
    - cd frontend
    - npm install
    - npm run test
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml

# --- LINTING ---
lint_backend:
  stage: lint
  before_script:
    - cd backend
    - chmod +x gradlew
  script:
    - ./gradlew check
  allow_failure: true

lint_frontend:
  image: node:22
  stage: lint
  script:
    - cd frontend
    - npm install
    - npm run lint
  allow_failure: true

# --- DEPLOYMENT ---
deploy_backend:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    - ssh $VM_USER@$VM_IP "cd ~/Project_3c && git pull origin main && docker compose up -d --build backend"
  only:
    - main