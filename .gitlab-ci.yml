image: eclipse-temurin:21-jdk

stages:
  - build
  - test
  - lint

before_script:
  - cd backend
  - chmod +x gradlew

build_backend:
  stage: build
  script:
    - ./gradlew clean assemble

test_backend:
  stage: test
  script:
    - ./gradlew test
  artifacts:
    when: always
    reports:
      junit: backend/build/test-results/test/**/TEST-*.xml

lint_backend:
  stage: lint
  script:
    - ./gradlew check
  allow_failure: false

lint_frontend:
  image: node:22
  stage: lint
  before_script: []
  script:
    - cd frontend
    - npm install
    - npm run lint
  allow_failure: false
