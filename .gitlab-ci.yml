image: eclipse-temurin:21-jdk

stages:
  - build
  - test
  - lint

# --- BACKEND JOBS ---
build_backend:
  stage: build
  before_script:
    - cd backend
    - chmod +x gradlew
  script:
    - ./gradlew clean assemble
  artifacts:
    paths:
      - backend/build/libs/*.jar
    expire_in: 1 week

test_backend:
  stage: test
  before_script:
    - cd backend
    - chmod +x gradlew
  script:
    # Run tests and generate the JaCoCo CSV report
    - ./gradlew test jacocoTestReport
    # Read the CSV and print the percentage to the console
    - awk -F"," '{ instructions += $4 + $5; covered += $5 } END { print covered, "/", instructions, " instructions covered"; print "Total coverage:", 100*covered/instructions, "%" }' build/reports/jacoco/test/jacocoTestReport.csv
  coverage: '/Total coverage: \d+\.\d+ %/'
  artifacts:
    when: always
    reports:
      junit: backend/build/test-results/test/**/TEST-*.xml

# --- FRONTEND JOBS ---
build_frontend:
  image: node:22
  stage: build
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week

test_frontend:
  image: node:22
  stage: test
  script:
    - cd frontend
    - npm install
    - npm run test
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml

# --- LINTING ---
lint_backend:
  stage: lint
  before_script:
    - cd backend
    - chmod +x gradlew
  script:
    - ./gradlew check
  allow_failure: true

lint_frontend:
  image: node:22
  stage: lint
  script:
    - cd frontend
    - npm install
    - npm run lint
  allow_failure: true